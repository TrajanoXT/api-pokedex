<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokédex</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --red: #e63946;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 28px 32px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-ball {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--red);
    position: relative;
    border: 2px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .logo-ball::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1.5px;
    background: rgba(255,255,255,0.2);
    transform: translateY(-50%);
  }
  .logo-ball::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
    border: 1.5px solid rgba(255,255,255,0.3);
    z-index: 1;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--red); }

  .controls {
    display: flex;
    gap: 10px;
    flex: 1;
    max-width: 520px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    padding: 9px 12px 9px 36px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--border-hover); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  select {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:focus { border-color: var(--border-hover); }
  select option { background: #1a1a1a; }

  .stats-bar {
    padding: 16px 32px;
    display: flex;
    gap: 20px;
    align-items: center;
    border-bottom: 0.5px solid var(--border);
    margin-top: 20px;
  }
  .stat-pill {
    font-size: 12px;
    color: var(--text-muted);
  }
  .stat-pill strong { color: var(--text); font-weight: 600; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 16px;
    padding: 24px 32px 48px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }

  .card-top {
    padding: 14px 14px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-num {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .shiny-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-size: 11px;
    padding: 3px 9px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .shiny-btn:hover { border-color: var(--border-hover); color: var(--text-muted); }
  .shiny-btn.active { border-color: #EF9F27; color: #EF9F27; background: rgba(239,159,39,0.08); }

  .card-img-wrap {
    height: 148px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin: 6px 0;
  }
  .card-glow {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    opacity: 0.06;
    filter: blur(20px);
  }
  .card-img-wrap img {
    width: 116px;
    height: 116px;
    object-fit: contain;
    position: relative;
    transition: opacity 0.18s;
    image-rendering: -webkit-optimize-contrast;
  }

  .card-body { padding: 0 14px 14px; }

  .card-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.2px;
  }

  .types {
    display: flex;
    gap: 5px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .type-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  .stats { display: flex; flex-direction: column; gap: 5px; }
  .stat-row { display: flex; align-items: center; gap: 7px; }
  .stat-key {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 600;
    width: 26px;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }
  .bar-bg {
    flex: 1;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 2px; }
  .stat-num {
    font-size: 10px;
    color: var(--text-muted);
    width: 22px;
    text-align: right;
    flex-shrink: 0;
  }

  .card-footer {
    border-top: 0.5px solid var(--border);
    padding: 9px 14px;
    display: flex;
    justify-content: space-between;
  }
  .meta { text-align: center; }
  .meta-l {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .meta-v { font-size: 12px; font-weight: 600; color: var(--text-muted); }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .loading {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .error-banner {
    margin: 16px 32px 0;
    background: rgba(230,57,70,0.08);
    border: 0.5px solid rgba(230,57,70,0.2);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: #e63946;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-ball"></div>
    <span class="logo-text">Poké<span>dex</span></span>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Buscar por nome ou número..." />
    </div>
    <select id="filter-type">
      <option value="">Todos os tipos</option>
    </select>
    <select id="sort">
      <option value="numero">Número</option>
      <option value="nome">Nome</option>
      <option value="hp">HP</option>
      <option value="ataque">Ataque</option>
      <option value="total">Total base</option>
    </select>
  </div>
</header>

<div class="error-banner" id="error-banner">
  Não foi possível conectar à API. Verifique se o servidor está rodando em <strong>localhost:8080</strong>.
</div>

<div class="stats-bar">
  <span class="stat-pill">Total: <strong id="count-total">—</strong></span>
  <span class="stat-pill">Exibindo: <strong id="count-showing">—</strong></span>
</div>

<div class="grid" id="grid">
  <div class="loading">Carregando Pokémon...</div>
</div>

<script>
const API = 'http://localhost:8080';

const TYPE_STYLES = {
  "Fogo":      { bg:"rgba(216,90,48,0.15)",  text:"#f0997b", bar:"#D85A30" },
  "Água":      { bg:"rgba(55,138,221,0.15)", text:"#85B7EB", bar:"#378ADD" },
  "Planta":    { bg:"rgba(99,153,34,0.15)",  text:"#97C459", bar:"#639922" },
  "Veneno":    { bg:"rgba(127,119,221,0.15)",text:"#AFA9EC", bar:"#7F77DD" },
  "Elétrico":  { bg:"rgba(239,159,39,0.15)", text:"#FAC775", bar:"#EF9F27" },
  "Psíquico":  { bg:"rgba(212,83,126,0.15)", text:"#ED93B1", bar:"#D4537E" },
  "Gelo":      { bg:"rgba(133,183,235,0.15)",text:"#B5D4F4", bar:"#85B7EB" },
  "Dragão":    { bg:"rgba(83,74,183,0.15)",  text:"#AFA9EC", bar:"#534AB7" },
  "Sombrio":   { bg:"rgba(95,94,90,0.15)",   text:"#888780", bar:"#5F5E5A" },
  "Lutador":   { bg:"rgba(216,90,48,0.15)",  text:"#F0997B", bar:"#D85A30" },
  "Voador":    { bg:"rgba(55,138,221,0.12)", text:"#85B7EB", bar:"#85B7EB" },
  "Inseto":    { bg:"rgba(99,153,34,0.12)",  text:"#97C459", bar:"#97C459" },
  "Pedra":     { bg:"rgba(136,135,128,0.15)",text:"#B4B2A9", bar:"#888780" },
  "Fantasma":  { bg:"rgba(83,74,183,0.12)",  text:"#AFA9EC", bar:"#534AB7" },
  "Aço":       { bg:"rgba(180,178,169,0.12)",text:"#B4B2A9", bar:"#B4B2A9" },
  "Terra":     { bg:"rgba(186,117,23,0.15)", text:"#FAC775", bar:"#BA7517" },
  "Normal":    { bg:"rgba(136,135,128,0.1)", text:"#888780", bar:"#888780" },
  "Fada":      { bg:"rgba(212,83,126,0.1)",  text:"#ED93B1", bar:"#ED93B1" },
};

const STAT_LABELS = { hp:"HP", ataque:"ATK", defesa:"DEF", ataqueEspecial:"SpA", defesaEspecial:"SpD", velocidade:"VEL" };
const STAT_MAX    = { hp:255, ataque:190, defesa:230, ataqueEspecial:194, defesaEspecial:230, velocidade:200 };

let allPokemon = [];
let tipos = [];

function barColor(key, val) {
  const p = val / STAT_MAX[key];
  if (p >= 0.65) return "#639922";
  if (p >= 0.38) return "#EF9F27";
  return "#e63946";
}

function baseTotal(e) {
  return (e.hp||0)+(e.ataque||0)+(e.defesa||0)+(e.ataqueEspecial||0)+(e.defesaEspecial||0)+(e.velocidade||0);
}

function numStr(n) { return "#" + String(n).padStart(3,"0"); }

function buildCard(p) {
  const mainType = TYPE_STYLES[p.tipos?.[0]?.nome] || TYPE_STYLES["Normal"];
  const total = baseTotal(p.estatisticas);

  const card = document.createElement("div");
  card.className = "card";
  card.style.cursor = "pointer";
  card.addEventListener("click", () => { window.location.href = `pokemon.html?id=${p.id}`; });

  const hasShiny = !!p.imagemShinyUrl;
  let shiny = false;

  card.innerHTML = `
    <div class="card-top">
      <span class="card-num">${numStr(p.numeroPokedex)}</span>
      ${hasShiny ? `<button class="shiny-btn" title="Ver versão shiny">✦ Shiny</button>` : `<span></span>`}
    </div>
    <div class="card-img-wrap">
      <div class="card-glow" style="background:${mainType.bar}"></div>
      <img src="${p.imageUrl || ''}" alt="${p.nome}" loading="lazy" />
    </div>
    <div class="card-body">
      <div class="card-name">${p.nome}</div>
      <div class="types">
        ${(p.tipos||[]).map(t => {
          const s = TYPE_STYLES[t.nome] || TYPE_STYLES["Normal"];
          return `<span class="type-badge" style="background:${s.bg};color:${s.text}">${t.nome}</span>`;
        }).join("")}
      </div>
      <div class="stats">
        ${Object.entries(STAT_LABELS).map(([key, label]) => {
          const val = p.estatisticas?.[key] ?? 0;
          const pct = Math.round((val / STAT_MAX[key]) * 100);
          return `
            <div class="stat-row">
              <span class="stat-key">${label}</span>
              <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${barColor(key,val)}"></div></div>
              <span class="stat-num">${val}</span>
            </div>`;
        }).join("")}
      </div>
    </div>
    <div class="card-footer">
      <div class="meta"><div class="meta-l">Altura</div><div class="meta-v">${p.altura?.toFixed(1)}m</div></div>
      <div class="meta"><div class="meta-l">Peso</div><div class="meta-v">${p.peso?.toFixed(1)}kg</div></div>
      <div class="meta"><div class="meta-l">Total</div><div class="meta-v">${total}</div></div>
    </div>
  `;

  if (hasShiny) {
    const btn = card.querySelector(".shiny-btn");
    const img = card.querySelector("img");
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      shiny = !shiny;
      img.style.opacity = "0";
      setTimeout(() => {
        img.src = shiny ? p.imagemShinyUrl : p.imageUrl;
        img.style.opacity = "1";
      }, 150);
      btn.classList.toggle("active", shiny);
    });
  }

  return card;
}

function render() {
  const query  = document.getElementById("search").value.toLowerCase().trim();
  const tipo   = document.getElementById("filter-type").value;
  const sortBy = document.getElementById("sort").value;

  let filtered = allPokemon.filter(p => {
    const matchName = p.nome.toLowerCase().includes(query) ||
                      String(p.numeroPokedex).includes(query);
    const matchTipo = !tipo || (p.tipos||[]).some(t => t.nome === tipo);
    return matchName && matchTipo;
  });

  filtered.sort((a, b) => {
    if (sortBy === "nome")   return a.nome.localeCompare(b.nome);
    if (sortBy === "hp")     return (b.estatisticas?.hp||0) - (a.estatisticas?.hp||0);
    if (sortBy === "ataque") return (b.estatisticas?.ataque||0) - (a.estatisticas?.ataque||0);
    if (sortBy === "total")  return baseTotal(b.estatisticas) - baseTotal(a.estatisticas);
    return a.numeroPokedex - b.numeroPokedex;
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  document.getElementById("count-total").textContent   = allPokemon.length;
  document.getElementById("count-showing").textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">Nenhum Pokémon encontrado.</div>`;
    return;
  }

  filtered.forEach(p => grid.appendChild(buildCard(p)));
}

function populateTypeFilter() {
  const sel = document.getElementById("filter-type");
  const nomes = [...new Set(allPokemon.flatMap(p => (p.tipos||[]).map(t => t.nome)))].sort();
  nomes.forEach(nome => {
    const opt = document.createElement("option");
    opt.value = nome;
    opt.textContent = nome;
    sel.appendChild(opt);
  });
}

async function init() {
  try {
    const res = await fetch(`${API}/pokemons`);
    if (!res.ok) throw new Error("API error");
    allPokemon = await res.json();
    populateTypeFilter();
    render();
  } catch (e) {
    document.getElementById("error-banner").style.display = "block";
    document.getElementById("grid").innerHTML = `<div class="empty">Não foi possível carregar os Pokémon.</div>`;
    document.getElementById("count-total").textContent = "0";
    document.getElementById("count-showing").textContent = "0";
  }
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("filter-type").addEventListener("change", render);
document.getElementById("sort").addEventListener("change", render);

init();
</script>
</body>
</html>
